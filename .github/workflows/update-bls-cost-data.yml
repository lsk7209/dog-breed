name: Update BLS Cost Data

on:
  workflow_dispatch:
  schedule:
    # BLS CPI is monthly; weekly checks catch new releases without excessive API calls.
    - cron: "20 15 * * 2"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build BLS cost pages
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          test -n "$BLS_API_KEY"
          python scripts/build_bls_cost_pages.py

      - name: Validate generated files
        run: |
          python -m py_compile scripts/build_bls_cost_pages.py scripts/publish_scheduled_posts.py
          test -f data/bls_pet_cost_cpi.json
          test -f cost/index.html
          test -f cost/pet-food-inflation.html
          test -f cost/pet-supplies-inflation.html
          test -f cost/pet-services-inflation.html
          grep -q "https://dogbreedcost.com/cost/pet-food-inflation.html" sitemap.xml

      - name: Commit changed BLS data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cost data/bls_pet_cost_cpi.json sitemap.xml scripts/build_bls_cost_pages.py scripts/publish_scheduled_posts.py
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No BLS data changes."
          else
            git commit -m "Update BLS pet cost data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write GSC credentials
        if: steps.commit.outputs.changed == 'true'
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$GSC_SERVICE_ACCOUNT_JSON"
          printf '%s' "$GSC_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/gsc-service-account.json"

      - name: Submit sitemap after data update
        if: steps.commit.outputs.changed == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gsc-service-account.json
          GSC_SITE_URL: https://dogbreedcost.com/
          GSC_SITEMAP_URL: https://dogbreedcost.com/sitemap.xml
        run: python scripts/submit_gsc_sitemap.py
